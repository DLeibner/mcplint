name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - mcp-playground-web

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable pnpm
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Install browser
        run: pnpm --filter @mcplint/web exec playwright install --with-deps chromium

      - name: Browser smoke tests
        run: pnpm --filter @mcplint/web test:e2e

      - name: Build
        run: pnpm build
